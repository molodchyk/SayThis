<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SayThis Options</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>SayThis Options</h1>
        <p id="status">Settings loaded.</p>
      </header>

      <section class="panel">
        <h2>Resolver</h2>
        <label class="toggle">
          <input id="online-default" type="checkbox">
          <span>Use online lookup by default</span>
        </label>
        <label class="toggle">
          <input id="show-overlay" type="checkbox">
          <span>Show on-page result card</span>
        </label>
        <label class="toggle">
          <input id="custom-source-enabled" type="checkbox">
          <span>Use a structured custom source</span>
        </label>
        <label class="field">
          <span>Custom source endpoint</span>
          <input id="custom-source-endpoint" type="url" placeholder="https://example.com/saythis/search" spellcheck="false">
        </label>
        <label class="field">
          <span>Custom source label</span>
          <input id="custom-source-label" type="text" placeholder="optional label shown in sources" spellcheck="false">
        </label>
        <label class="toggle">
          <input id="forvo-enabled" type="checkbox">
          <span>Use Forvo pronunciation audio</span>
        </label>
        <label class="field">
          <span>Forvo API key</span>
          <input id="forvo-api-key" type="password" autocomplete="off" spellcheck="false">
        </label>
        <label class="field">
          <span>Forvo language filter</span>
          <input id="forvo-language" type="text" placeholder="optional, for example en or it" spellcheck="false">
        </label>
        <label class="toggle">
          <input id="gazetteer-enabled" type="checkbox">
          <span>Use a Nominatim-compatible place-name endpoint</span>
        </label>
        <label class="field">
          <span>Place-name endpoint</span>
          <input id="gazetteer-endpoint" type="url" placeholder="https://example.com/search" spellcheck="false">
        </label>
        <p id="cache-summary" class="summary">No cached lookups.</p>
        <div class="actions">
          <button id="clear-cache" type="button" class="secondary">Clear Lookup Cache</button>
        </div>
      </section>

      <section class="panel">
        <h2>Community Memory</h2>
        <p id="memory-summary" class="summary">No local entries.</p>
        <div class="actions">
          <button id="export-data" type="button">Export</button>
          <button id="import-data" type="button" class="secondary">Import</button>
          <button id="clear-memory" type="button" class="danger">Clear</button>
        </div>
        <label class="field">
          <span>Data</span>
          <textarea id="data-box" rows="12" spellcheck="false"></textarea>
        </label>
      </section>

      <section class="panel">
        <h2>Community Sync</h2>
        <p id="sync-summary" class="summary">No queued submissions.</p>
        <label class="toggle">
          <input id="sync-enabled" type="checkbox">
          <span>Submit corrections to a community endpoint</span>
        </label>
        <label class="field">
          <span>Endpoint</span>
          <input id="sync-endpoint" type="url" placeholder="https://example.com/saythis/submit" spellcheck="false">
        </label>
        <div class="actions">
          <button id="flush-sync" type="button">Sync Now</button>
          <button id="pull-approved" type="button" class="secondary">Refresh Approved</button>
          <button id="clear-approved" type="button" class="secondary">Clear Approved</button>
          <button id="clear-sync" type="button" class="secondary">Clear Queue</button>
        </div>
        <p id="approved-summary" class="summary">No approved shared entries.</p>
      </section>
    </main>

    <script type="module" src="options.js"></script>
  </body>
</html>
