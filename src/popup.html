<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SayThis</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>SayThis</h1>
        <p id="status">Select text, then resolve it.</p>
      </header>

      <label class="field">
        <span>Selection</span>
        <textarea id="selection" rows="3" maxlength="160" spellcheck="false"></textarea>
      </label>

      <div class="actions">
        <button id="resolve" type="button">Resolve</button>
        <button id="resolve-online" type="button" class="secondary">Online</button>
        <button id="speak" type="button">Speak</button>
        <button id="slow" type="button" class="secondary">Slow</button>
        <button id="stop" type="button" class="secondary">Stop</button>
      </div>

      <section id="result-card" class="result-card" hidden>
        <div class="result-head">
          <div>
            <span class="eyebrow">Resolved</span>
            <h2 id="result-display"></h2>
          </div>
          <div class="badges">
            <span id="confidence-badge" class="badge"></span>
            <span id="source-badge" class="badge subtle"></span>
          </div>
        </div>

        <dl class="facts">
          <div>
            <dt>Source form</dt>
            <dd id="source-form"></dd>
          </div>
          <div>
            <dt>Aliases</dt>
            <dd id="aliases"></dd>
          </div>
          <div>
            <dt>Language</dt>
            <dd id="language"></dd>
          </div>
          <div>
            <dt>Category</dt>
            <dd id="category"></dd>
          </div>
          <div>
            <dt>Origin</dt>
            <dd id="origin"></dd>
          </div>
          <div>
            <dt>IPA</dt>
            <dd id="ipa"></dd>
          </div>
          <div>
            <dt>Guide</dt>
            <dd id="simple-guide"></dd>
          </div>
        </dl>

        <ul id="alternates" class="alternates" aria-label="Alternate candidates"></ul>
        <ul id="evidence" class="evidence"></ul>
        <ul id="sources" class="sources" aria-label="Sources"></ul>

        <div class="feedback-actions" aria-label="Community feedback">
          <button id="confirm" type="button" class="small">Confirm</button>
          <button id="wrong" type="button" class="small secondary">Wrong</button>
          <button id="missing" type="button" class="small secondary">Missing</button>
        </div>
      </section>

      <details class="correction">
        <summary>Correction</summary>
        <div class="correction-grid">
          <label class="field compact">
            <span>Source form</span>
            <input id="correction-source" type="text" maxlength="160" spellcheck="false">
          </label>
          <label class="field compact">
            <span>Aliases</span>
            <input id="correction-aliases" type="text" maxlength="240" spellcheck="false">
          </label>
          <label class="field compact">
            <span>Language</span>
            <input id="correction-language" type="text" maxlength="24" spellcheck="false">
          </label>
          <label class="field compact">
            <span>Language name</span>
            <input id="correction-language-name" type="text" maxlength="80" spellcheck="false">
          </label>
          <label class="field compact">
            <span>Simple guide</span>
            <input id="correction-simple" type="text" maxlength="120" spellcheck="false">
          </label>
          <label class="field compact">
            <span>IPA</span>
            <input id="correction-ipa" type="text" maxlength="120" spellcheck="false">
          </label>
          <label class="field compact full">
            <span>Origin</span>
            <input id="correction-origin" type="text" maxlength="160" spellcheck="false">
          </label>
          <label class="field compact full">
            <span>Audio source</span>
            <input id="correction-audio" type="url" maxlength="2048" spellcheck="false">
          </label>
          <label class="field compact full">
            <span>Source link</span>
            <input id="correction-source-url" type="url" maxlength="2048" spellcheck="false">
          </label>
          <label class="field compact full">
            <span>Variant note</span>
            <input id="correction-variant" type="text" maxlength="160" spellcheck="false">
          </label>
        </div>
        <button id="save-correction" type="button" class="small">Save</button>
      </details>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
