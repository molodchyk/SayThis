name: Non-browser checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run unit tests
        run: npm test

      - name: Run syntax checks
        run: npm run check

      - name: Run architecture audit
        run: npm run audit:architecture

      - name: Run public audio audit
        run: npm run audit:public-audio

      - name: Run release readiness audit
        run: npm run audit:release

      - name: Build Chrome package
        run: npm run package:chrome
